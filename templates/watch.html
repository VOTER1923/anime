<!DOCTYPE html>
<html>
<head>
<title>{{ anime_title }} Episode {{ episode_number }}</title>
<link rel="stylesheet" href="/static/style.css">
<style>
video {
    width: 80%;
    margin: 40px auto;
    display: block;
    border-radius: 10px;
}
</style>
</head>
<body>

<h1 style="text-align:center;">{{ anime_title }} — Episode {{ episode_number }}</h1>

<video controls>
    <source src="{{ source_url }}" type="video/mp4">
</video>

<p style="text-align:center;">
    <a href="/anime/{{ anime_id }}">Back to Episodes</a>
</p>

</body>
</html>
